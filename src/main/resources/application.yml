server:
  port: 8080

spring:
  application:
    name: bookapp

  config:
    import:
      - optional:application-local.yml

  datasource:
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    url: ${DB_URL:jdbc:h2:file:~/bookdb;}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:1234}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: aivle-bookapp-jwt-secret-key-2026!
  access-expiration: 10800000
  refresh-expiration: 86400000

openai:
  api:
    key: ${OPENAI_API_KEY:}
