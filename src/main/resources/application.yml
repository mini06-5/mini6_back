server:
  port: 8080

spring:
  application:
    name: bookapp
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:~/bookdb;
    username: sa
    password: 1234
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  config:
    import: optional:application-local.yml

jwt:
  secret: aivle-bookapp-jwt-secret-key-2026!
  access-expiration: 10800000
  refresh-expiration: 86400000
