server:
  port: 8080

spring:
  application:
    name: bookapp
  
  # AWS Parameter Store 연동 설정 추가
  config:
    import: 
      - optional:application-local.yml
      - aws-parameterstore:/bookapp/prod/ # AWS 파라미터 경로
  cloud:
    aws:
      region:
        static: us-east-1 # 버지니아 북부 리전 적용
      credentials:
        use-default-aws-credentials-chain: true

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:~/bookdb;
    username: sa
    password: 1234
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: aivle-bookapp-jwt-secret-key-2026!
  access-expiration: 10800000
  refresh-expiration: 86400000

openai:
  api-key: ${OPENAI_API_KEY}
