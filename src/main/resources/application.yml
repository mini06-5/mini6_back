server:
  port: 8080

spring:
  application:
    name: bookapp
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:~/bookdb;
    username: sa
    password: 1234
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: aivle-bookapp-jwt-secret-key-2026!
  expiration: 3600000